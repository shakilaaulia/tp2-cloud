apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-hiburan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-hiburan
  template:
    metadata:
      labels:
        app: backend-hiburan
    spec:
      containers:
      - name: backend
        image: shakilaaulia245/hiburan-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: NAMA_PRAKTIKAN
          value: "Shakila Aulia" 
        - name: NIM_PRAKTIKAN
          value: "2403086"      
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: backend-hiburan
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-hiburan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-hiburan
  template:
    metadata:
      labels:
        app: frontend-hiburan
    spec:
      containers:
      - name: frontend
        image: shakilaaulia245/hiburan-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: frontend-hiburan
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hiburan-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      - path: /?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 80