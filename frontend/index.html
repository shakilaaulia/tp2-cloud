<!doctype html>
<html>
  <head>
    <title>Koleksi Hiburan</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: white;
        text-align: center;
      }
      .container {
        margin-top: 50px;
        border: 1px solid #16213e;
        padding: 20px;
        display: inline-block;
        border-radius: 10px;
        background: #0f3460;
      }
      input {
        padding: 10px;
        border-radius: 5px;
        border: none;
      }
      button {
        padding: 10px 20px;
        background: #e94560;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1 id="katalog-name">Memuat...</h1>
    <p id="owner"></p>

    <ul id="hiburan-list"></ul>

    <hr />

    <h3>Tambah Hiburan Baru:</h3>
    <input
      type="text"
      id="hiburan-input"
      placeholder="Judul film / anime / musik..."
    />
    <button onclick="tambahItem()">Tambah</button>

    <script>
      const API_URL = '/api';

      function loadData() {
        fetch(`${API_URL}/info`)
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("katalog-name").innerText =
              data.judul_katalog;
            document.getElementById("owner").innerText =
              "Pemilik: " + data.pemilik + " (" + data.nim + ")";

            const list = document.getElementById("hiburan-list");
            list.innerHTML = "";

            data.items.forEach((item) => {
              let li = document.createElement("li");
              li.innerText = item;
              list.appendChild(li);
            });
          });
      }

      function tambahItem() {
        const input = document.getElementById("hiburan-input");

        fetch(`${API_URL}/add-item`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ item: input.value }),
        })
          .then((res) => res.json())
          .then(() => {
            input.value = "";
            loadData();
          });
      }

      loadData();
    </script>
  </body>
</html>
